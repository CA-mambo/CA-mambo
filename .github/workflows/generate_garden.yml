name: Generate Garden
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install keyring (optional fallback)
        run: pip install keyring keyrings.alt

      - name: Run Generator
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python garden_gen.py CA-mambo

      - name: Commit changes
        run: |
          git config --global user.name 'mambo-bot'
          git config --global user.email 'mambo@qwenpaw.local'
          git add garden.svg
          git diff --quiet && git commit -m "Update Garden" || echo "No changes to commit"
          git push
